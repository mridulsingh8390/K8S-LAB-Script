# ---------------------------------------------------------------------------
# Kubernetes ServiceAccount (KSA) used by the dotnet pod, annotated for
# Workload Identity Federation for GKE - the GKE equivalent of AKS's Azure
# AD Workload Identity and EKS's IRSA. When this KSA is used by a pod, GKE's
# metadata server lets it impersonate the annotated GCP service account
# (GSA) when calling Google Cloud APIs, with no static credentials.
#
# If you ran run-all.sh, the GSA email placeholder is filled in
# automatically. If you ran 01-gke-identity-and-sql.sh by hand, copy the
# "GSA email" it printed into the annotation below.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dotnet-app-sa
  namespace: dev
  annotations:
    iam.gke.io/gcp-service-account: "<GSA-EMAIL>"
