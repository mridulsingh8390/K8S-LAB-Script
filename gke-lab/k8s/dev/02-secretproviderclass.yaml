# ---------------------------------------------------------------------------
# Mounts the SQL credentials from Secret Manager as files inside the pod,
# AND syncs them into a native Kubernetes Secret (secretObjects below) so
# they can be consumed as env vars too - same dual-purpose pattern as the
# AKS/EKS labs' SecretProviderClass.
#
# DIFFERENCE FROM THE EKS LAB: that lab stored all SQL fields as one
# combined JSON secret in AWS Secrets Manager and used the AWS provider's
# jmesPath feature to split it back out at mount time. The GCP provider for
# the Secrets Store CSI Driver has no equivalent JSON-path-splitting
# feature, so this lab stores each field as its OWN separate Secret Manager
# secret instead (gke-lab-sql-username, gke-lab-sql-password, etc.) -
# directly mirroring how the AKS lab's Azure Key Vault stores 5 separate
# secrets. 00-gcp-infra.sh creates all 5; 01-gke-identity-and-sql.sh grants
# the workload identity read access to all 5.
# ---------------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dotnet-app-secrets-spc
  namespace: dev
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/<PROJECT_ID>/secrets/gke-lab-sql-username/versions/latest"
        fileName: "sql-username"
      - resourceName: "projects/<PROJECT_ID>/secrets/gke-lab-sql-password/versions/latest"
        fileName: "sql-password"
      - resourceName: "projects/<PROJECT_ID>/secrets/gke-lab-sql-host/versions/latest"
        fileName: "sql-host"
      - resourceName: "projects/<PROJECT_ID>/secrets/gke-lab-sql-port/versions/latest"
        fileName: "sql-port"
      - resourceName: "projects/<PROJECT_ID>/secrets/gke-lab-sql-dbname/versions/latest"
        fileName: "sql-dbname"
  secretObjects:
    - secretName: sql-credentials
      type: Opaque
      data:
        - objectName: sql-username
          key: SQL_USERNAME
        - objectName: sql-password
          key: SQL_PASSWORD
        - objectName: sql-host
          key: SQL_HOST
        - objectName: sql-port
          key: SQL_PORT
        - objectName: sql-dbname
          key: SQL_DATABASE
