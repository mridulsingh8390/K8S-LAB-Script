# ---------------------------------------------------------------------------
# Two throwaway pods to validate the NetworkPolicy - identical pattern to
# the AKS/EKS labs.
#
# Usage after applying:
#   kubectl get pod -n dev net-test-dev -o wide   # note its pod IP
#   kubectl exec -n dev net-test-dev -- ping -c 3 <other-dev-pod-ip>
#   kubectl exec -n other-ns net-test-other -- ping -c 3 <dev-pod-ip>
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: net-test-dev
  namespace: dev
  labels:
    app: net-test
spec:
  containers:
    - name: net-test
      image: busybox:1.36
      command: ["sleep", "3600"]
      securityContext:
        capabilities:
          add: ["NET_RAW"]
---
apiVersion: v1
kind: Namespace
metadata:
  name: other-ns
  labels:
    environment: other
---
apiVersion: v1
kind: Pod
metadata:
  name: net-test-other
  namespace: other-ns
  labels:
    app: net-test
spec:
  containers:
    - name: net-test
      image: busybox:1.36
      command: ["sleep", "3600"]
      securityContext:
        capabilities:
          add: ["NET_RAW"]
