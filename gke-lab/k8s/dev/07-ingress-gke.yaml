# ---------------------------------------------------------------------------
# GKE Ingress - the GCE Ingress Controller is built into GKE itself; there
# is no separate controller to install the way AGIC and the AWS Load
# Balancer Controller needed on the AKS/EKS labs. Applying this object is
# the entire setup. GKE creates a global external Application Load Balancer,
# health checks (derived from the Pod's readinessProbe by default), and the
# Network Endpoint Groups (NEGs) that let the load balancer talk to pod IPs
# directly (container-native load balancing), as long as the backing
# Service is annotated correctly (see 04-deployment-service.yaml).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dotnet-helloworld-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: dotnet-helloworld-svc
                port:
                  number: 80
  # For TLS termination, add a Google-managed certificate and:
  # tls:
  #   - hosts:
  #       - app.example.com
  #     secretName: dotnet-tls-secret
  # See: https://cloud.google.com/kubernetes-engine/docs/how-to/managed-certs
