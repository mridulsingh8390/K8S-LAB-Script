# ---------------------------------------------------------------------------
# ServiceAccount used by the dotnet pod, annotated for IRSA (IAM Roles for
# Service Accounts) — the EKS equivalent of AKS's Azure AD Workload Identity.
# When this SA is used by a pod, AWS's pod identity webhook injects the
# right environment variables/projected token so the AWS SDK inside the
# pod (and the Secrets Store CSI driver's AWS provider) can assume the IAM
# role below without any static credentials.
#
# If you ran run-all.sh, the role ARN placeholder is filled in
# automatically. If you ran 01-aws-lbc-and-identity.sh by hand, copy the
# "Pod IAM role ARN" it printed into the annotation below.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dotnet-app-sa
  namespace: dev
  annotations:
    eks.amazonaws.com/role-arn: "<POD-IAM-ROLE-ARN>"
