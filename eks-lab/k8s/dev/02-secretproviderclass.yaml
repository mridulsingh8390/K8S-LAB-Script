# ---------------------------------------------------------------------------
# Mounts the SQL credentials from AWS Secrets Manager as files inside the
# pod, AND syncs them into a native Kubernetes Secret (secretObjects below)
# so they can be consumed as env vars too — same dual-purpose pattern as
# the AKS lab's SecretProviderClass.
#
# IMPORTANT DIFFERENCE FROM AKS: 00-aws-infra.sh stores ALL the SQL
# connection fields (username, password, host, port, dbname) as ONE JSON
# secret in Secrets Manager, not five separate secrets the way Azure Key
# Vault stores five independent secret objects. The AWS provider's
# jmesPath field is what lets us pull each field back out of that single
# JSON blob into its own named alias.
# ---------------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dotnet-app-secrets-spc
  namespace: dev
spec:
  provider: aws
  parameters:
    usePodIdentity: "false"   # we're using IRSA (the ServiceAccount annotation), not EKS Pod Identity
    objects: |
      - objectName: "<SQL-SECRET-ARN>"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "sql-username"
          - path: "password"
            objectAlias: "sql-password"
          - path: "host"
            objectAlias: "sql-host"
          - path: "to_string(port)"
            objectAlias: "sql-port"
          - path: "dbname"
            objectAlias: "sql-dbname"
  secretObjects:
    - secretName: sql-credentials
      type: Opaque
      data:
        - objectName: sql-username
          key: SQL_USERNAME
        - objectName: sql-password
          key: SQL_PASSWORD
        - objectName: sql-host
          key: SQL_HOST
        - objectName: sql-port
          key: SQL_PORT
        - objectName: sql-dbname
          key: SQL_DATABASE
