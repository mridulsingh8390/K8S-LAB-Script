# ---------------------------------------------------------------------------
# AWS Load Balancer Controller watches Ingress resources with
# ingressClassName: alb and provisions/configures an Application Load
# Balancer accordingly — the AWS equivalent of AGIC.
#
# target-type: ip means the ALB routes directly to pod IPs (requires VPC
# CNI, which EKS uses by default) rather than via NodePort on EC2
# instances. This is the closer architectural match to how AGIC reaches
# pod IPs directly on AKS, and is what the NetworkPolicy in
# 05-networkpolicy.yaml assumes when accounting for ALB traffic.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dotnet-helloworld-ingress
  namespace: dev
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "20"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200-399"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dotnet-helloworld-svc
                port:
                  number: 80
  # For TLS termination at the ALB, add a host rule plus:
  # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
  # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
