# ---------------------------------------------------------------------------
# Mounts the SQL password (and connection details) from Key Vault as files
# inside the pod, AND syncs them into a native Kubernetes Secret
# (secretObjects below) so they can be consumed as env vars too.
# ---------------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dotnet-app-kv-spc
  namespace: dev
spec:
  provider: azure
  secretObjects:
    - secretName: sql-credentials       # K8s Secret created from the mounted values
      type: Opaque
      data:
        - objectName: sql-admin-password
          key: SQL_PASSWORD
        - objectName: sql-admin-username
          key: SQL_USERNAME
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<USER-ASSIGNED-IDENTITY-CLIENT-ID>"   # same identity as the ServiceAccount annotation
    keyvaultName: "<KEY-VAULT-NAME>"                 # e.g. kv-aks-lab-1234
    tenantId: "<AZURE-TENANT-ID>"
    objects: |
      array:
        - |
          objectName: sql-admin-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: sql-admin-username
          objectType: secret
          objectVersion: ""
