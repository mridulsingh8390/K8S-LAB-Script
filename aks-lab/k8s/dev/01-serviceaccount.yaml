# ---------------------------------------------------------------------------
# Service account used by the dotnet pod. Annotated for Azure AD Workload
# Identity so the Key Vault CSI driver can authenticate without a static
# secret.
#
# If you ran run-all.sh, this is already done for you (it creates the
# identity "id-dotnet-app", enables OIDC issuer/workload identity on the
# cluster if needed, federates it to system:serviceaccount:dev:dotnet-app-sa,
# grants it get/list on Key Vault, and fills in the client-id annotation
# below). The manual equivalent, if you're doing this by hand instead:
#
#   az identity create -g <RESOURCE_GROUP> -n id-dotnet-app
#   az identity federated-credential create -g <RESOURCE_GROUP> \
#     --identity-name id-dotnet-app --name dotnet-app-fed \
#     --issuer "$(az aks show -g <RESOURCE_GROUP> -n <AKS_CLUSTER_NAME> --query oidcIssuerProfile.issuerUrl -o tsv)" \
#     --subject "system:serviceaccount:dev:dotnet-app-sa" \
#     --audiences "api://AzureADTokenExchange"
#
#   az keyvault set-policy -n <KEY_VAULT_NAME> \
#     --object-id "$(az identity show -g <RESOURCE_GROUP> -n id-dotnet-app --query principalId -o tsv)" \
#     --secret-permissions get list
#
# Then put that identity's clientId into the annotation below.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dotnet-app-sa
  namespace: dev
  annotations:
    azure.workload.identity/client-id: "<USER-ASSIGNED-IDENTITY-CLIENT-ID>"
  labels:
    azure.workload.identity/use: "true"
